<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易错字趣味竞技场</title>
    <style>
        :root { --main: #6BCB77; --wrong: #FF6B6B; --bg: #F0F7F4; --accent: #FFD93D; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { width: 92%; max-width: 550px; background: white; border-radius: 30px; padding: 25px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); border: 4px solid var(--main); text-align: center; }
        
        /* 姓名登录界面 */
        #login-screen { display: flex; flex-direction: column; align-items: center; }
        input { padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #DDD; width: 80%; margin-bottom: 20px; text-align: center; }
        
        .menu-btn { background: var(--main); color: white; border: none; padding: 16px; margin: 8px; border-radius: 50px; width: 85%; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #4da658; font-weight: bold; }
        .sentence { font-size: 38px; margin: 20px 0; font-weight: bold; }
        .blank { color: var(--wrong); border-bottom: 4px solid var(--wrong); padding: 0 8px; }
        .definition { font-size: 15px; color: #34495E; background: #FFF9C4; padding: 12px; border-radius: 12px; margin: 10px 0; text-align: left; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .opt-btn { background: #FFF; border: 3px solid #AED581; border-radius: 20px; font-size: 48px; padding: 15px; cursor: pointer; box-shadow: 0 6px 0 #AED581; }
        .hidden { display: none; }
        .progress-bar { width: 100%; height: 10px; background: #EEE; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--main); transition: 0.3s; }
        #result-card { background: #E8F5E9; padding: 20px; border-radius: 20px; border: 2px dashed var(--main); }
    </style>
</head>
<body>

<div id="app">
    <!-- 第一步：输入姓名 -->
    <div id="login-screen">
        <h2 style="color:var(--main)">👋 你好！小状元</h2>
        <p>在开始挑战前，请告诉老师你的名字：</p>
        <input type="text" id="student-name" placeholder="输入姓名..." maxlength="10">
        <button class="menu-btn" onclick="showMenu()">进入大闯关</button>
    </div>

    <!-- 第二步：选择关卡 -->
    <div id="menu" class="hidden">
        <h2 id="welcome-msg" style="color:var(--main)"></h2>
        <div id="level-list"></div>
    </div>

    <!-- 第三步：游戏区 -->
    <div id="game" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; font-size: 14px;">
            <button onclick="location.reload()" style="border:none; background:none; color:#999;">🏠 换关卡</button>
            <span id="current-level-name" style="font-weight:bold; color:var(--main)"></span>
            <span id="stat-text">剩余: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-container">
            <div class="pinyin" id="pinyin" style="color:#888; font-size:18px;"></div>
            <div class="sentence"><span id="pre"></span><span class="blank">?</span><span id="suf"></span></div>
            <div class="definition" id="definition"></div>
        </div>
        <div class="options">
            <button class="opt-btn" id="opt0" onclick="handleChoice(0)"></button>
            <button class="opt-btn" id="opt1" onclick="handleChoice(1)"></button>
        </div>
        <div id="feedback" style="margin-top:15px; min-height:50px; font-weight:bold;"></div>
    </div>

    <!-- 第四步：结算奖状 -->
    <div id="result-screen" class="hidden">
        <div id="result-card">
            <p style="font-size:50px; margin:0;">📜</p>
            <h3 style="color:var(--main)">通关奖状</h3>
            <p style="font-size:18px;">祝贺 <b id="res-name" style="color:#E91E63"></b> 同学！</p>
            <p>你已成功通过：<br><b id="res-level"></b></p>
            <p>掌握率：<b id="res-acc" style="font-size:24px; color:var(--main)"></b></p>
            <p style="font-size:12px; color:#999;" id="res-time"></p>
        </div>
        <button class="menu-btn" onclick="location.reload()" style="margin-top:20px;">继续挑战其他关卡</button>
    </div>
</div>

<script>
    let studentName = "";
    let currentLvlName = "";
    // 题库数据（此处省略重复部分，保持之前的78个字逻辑）
    const allLevels = [
        { name: "第一关：森林冒险", words: [{w:"径直", t:"径", n:"经", p:"jìng zhí", d:"不绕路，直接走。", h:"双人旁代表路。"}, {w:"野兔", t:"兔", n:"免", p:"yě tù", d:"跑得快的长耳动物。", h:"点是尾巴。"}] },
        { name: "第二关：深海探秘", words: [{w:"咀嚼", t:"咀", n:"阻", p:"jǔ jué", d:"细细磨碎食物。", h:"用口咀嚼。"}] },
        // ... 其他关卡数据
    ];

    function showMenu() {
        studentName = document.getElementById('student-name').value;
        if(!studentName) { alert("请输入名字哦！"); return; }
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = `加油，${studentName}！`;
        
        const list = document.getElementById('level-list');
        list.innerHTML = "";
        allLevels.forEach((lvl, idx) => {
            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.innerText = lvl.name;
            btn.onclick = () => startLevel(idx);
            list.appendChild(btn);
        });
    }

    let activePool = [], currentQ = null, totalInLevel = 0, wrongAttempts = 0;

    function startLevel(idx) {
        currentLvlName = allLevels[idx].name;
        activePool = JSON.parse(JSON.stringify(allLevels[idx].words));
        totalInLevel = activePool.length;
        wrongAttempts = 0;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        document.getElementById('current-level-name').innerText = currentLvlName;
        nextQuestion();
    }

    function nextQuestion() {
        if (activePool.length === 0) { showFinalResult(); return; }
        document.getElementById('feedback').innerHTML = "";
        const randIdx = Math.floor(Math.random() * activePool.length);
        currentQ = activePool[randIdx];
        currentQ.poolIdx = randIdx;
        document.getElementById('pinyin').innerText = currentQ.p;
        document.getElementById('definition').innerHTML = `<b>提示：</b>${currentQ.d}`;
        const parts = currentQ.w.split(currentQ.t);
        document.getElementById('pre').innerText = parts[0] || "";
        document.getElementById('suf').innerText = parts[1] || "";
        const isFlip = Math.random() > 0.5;
        document.getElementById('opt0').innerText = isFlip ? currentQ.t : currentQ.n;
        document.getElementById('opt1').innerText = isFlip ? currentQ.n : currentQ.t;
        currentQ.correctBtn = isFlip ? 0 : 1;
        updateUI();
    }

    function handleChoice(idx) {
        const fb = document.getElementById('feedback');
        if (idx === currentQ.correctBtn) {
            fb.innerHTML = "<span style='color:var(--main);'>恭喜你，答对了！🌟</span>";
            activePool.splice(currentQ.poolIdx, 1);
            setTimeout(nextQuestion, 1000);
        } else {
            wrongAttempts++;
            fb.innerHTML = `<span style='color:var(--wrong)'>❌ 记一记：${currentQ.h}</span>`;
            setTimeout(nextQuestion, 3000);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('stat-text').innerText = `剩余: ${activePool.length}`;
        document.getElementById('progress-fill').style.width = ((totalInLevel - activePool.length) / totalInLevel) * 100 + "%";
    }

    function showFinalResult() {
        document.getElementById('game').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-name').innerText = studentName;
        document.getElementById('res-level').innerText = currentLvlName;
        const acc = Math.round((totalInLevel / (totalInLevel + wrongAttempts)) * 100);
        document.getElementById('res-acc').innerText = acc + "%";
        document.getElementById('res-time').innerText = "完成时间：" + new Date().toLocaleString();
    }
</script>
</body>
</html>
