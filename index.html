<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高频易错字趣味闯关</title>
    <style>
        :root { --main: #6BCB77; --wrong: #FF6B6B; --bg: #F0F7F4; --accent: #FFD93D; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { width: 92%; max-width: 550px; background: white; border-radius: 30px; padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); border: 4px solid var(--main); text-align: center; }
        .menu-btn { background: var(--main); color: white; border: none; padding: 14px; margin: 6px; border-radius: 50px; width: 85%; font-size: 17px; cursor: pointer; box-shadow: 0 4px 0 #4da658; font-weight: bold; }
        .home-btn { background: #95A5A6; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .pinyin { font-size: 18px; color: #7F8C8D; margin-bottom: 5px; }
        .sentence { font-size: 38px; margin: 15px 0; font-weight: bold; }
        .blank { color: var(--wrong); border-bottom: 4px solid var(--wrong); padding: 0 8px; }
        .definition { font-size: 15px; color: #34495E; background: #FFF9C4; padding: 12px; border-radius: 12px; margin: 10px 0; text-align: left; line-height: 1.5; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .opt-btn { background: #FFF; border: 3px solid #AED581; border-radius: 20px; font-size: 48px; padding: 15px; cursor: pointer; box-shadow: 0 6px 0 #AED581; touch-action: manipulation; }
        #feedback { margin-top: 15px; min-height: 60px; font-weight: bold; font-size: 18px; }
        .hidden { display: none; }
        .progress-bar { width: 100%; height: 10px; background: #EEE; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--main); transition: 0.3s; }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <h2 style="color:var(--main); margin-bottom:5px;">🎯 易错字大闯关</h2>
        <p style="color:#7F8C8D; font-size:14px;">答对即消除，答错会重复出现</p>
        <div id="level-list"></div>
    </div>

    <div id="game" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button class="home-btn" onclick="location.reload()">🏠 返回首页</button>
            <span id="stat-text" style="font-size:14px;">剩余: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-container">
            <div class="pinyin" id="pinyin"></div>
            <div class="sentence"><span id="pre"></span><span class="blank">?</span><span id="suf"></span></div>
            <div class="definition" id="definition"></div>
        </div>
        <div class="options">
            <button class="opt-btn" id="opt0" onclick="handleChoice(0)"></button>
            <button class="opt-btn" id="opt1" onclick="handleChoice(1)"></button>
        </div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const allLevels = [
        { name: "第一关：森林冒险", words: [
            {w:"径直", t:"径", n:"经", p:"jìng zhí", d:"直接向某处前进，不绕路。", h:"双人旁代表路。"},
            {w:"野兔", t:"兔", n:"免", p:"yě tù", d:"长耳朵、跑得快的野生动物。", h:"兔字有点（尾巴）。"},
            {w:"想到", t:"想", n:"相", p:"xiǎng dào", d:"脑中产生念头。", h:"思考需要‘心’。"},
            {w:"窒息", t:"窒", n:"室", p:"zhì xī", d:"呼吸受阻，憋气。", h:"下边是‘至’。"},
            {w:"冷静", t:"静", n:"净", p:"lěng jìng", d:"沉着不慌张。", h:"静是平稳的意思。"},
            {w:"奈何", t:"奈", n:"内", p:"nài hé", d:"表示没有办法。", h:"奈字上边是大。"},
            {w:"马厩", t:"厩", n:"既", p:"mǎ jiù", d:"养牲口的房舍。", h:"厂字头代表建筑。"},
            {w:"呼吸", t:"呼", n:"乎", p:"hū xī", d:"气流进出肺部。", h:"用口呼气。"},
            {w:"始终", t:"终", n:"冬", p:"shǐ zhōng", d:"从开始到最后。", h:"终是丝线的末端。"},
            {w:"见状", t:"状", n:"壮", p:"jiàn zhuàng", d:"看到当时的样子。", h:"状是情形。"},
            {w:"紧张", t:"紧", n:"斤", p:"jǐn zhāng", d:"精神不安或快节奏。", h:"紧字下面是丝。"},
            {w:"自己", t:"己", n:"已", p:"zì jǐ", d:"指本人。", h:"己字不开口。"},
            {w:"砸死", t:"砸", n:"扎", p:"zá sǐ", d:"被沉重物体猛撞。", h:"砸东西用石头（石部）。"}
        ]},
        { name: "第二关：深海探秘", words: [
            {w:"体力", t:"体", n:"休", p:"tǐ lì", d:"身体的力量。", h:"身体的体。"},
            {w:"鼻子", t:"鼻", n:"自", p:"bí zi", d:"脸上的嗅觉器官。", h:"鼻下有田和丌。"},
            {w:"笑道", t:"笑", n:"效", p:"xiào dào", d:"带着喜悦表情说话。", h:"笑是竹字头。"},
            {w:"找到", t:"找", n:"我", p:"zhǎo dào", d:"寻觅到东西。", h:"找要用手。"},
            {w:"零星", t:"零", n:"灵", p:"líng xīng", d:"数量少且分散。", h:"零像雨滴。"},
            {w:"咀嚼", t:"咀", n:"阻", p:"jǔ jué", d:"磨碎食物或细细领会。", h:"咀嚼用口。"},
            {w:"殊不知", t:"殊", n:"珠", p:"shū bù zhī", d:"没想到，竟不知。", h:"殊是不同。"},
            {w:"已然", t:"已", n:"己", p:"yǐ rán", d:"表示事情成了过去。", h:"已半开口。"},
            {w:"轮廓", t:"廓", n:"廊", p:"lún kuò", d:"物体的外缘线条。", h:"内是‘郭’。"},
            {w:"紧迫", t:"迫", n:"白", p:"jǐn pò", d:"时间非常紧急。", h:"迫切要走（走之）。"},
            {w:"移", t:"移", n:"多", p:"yí", d:"挪动位置。", h:"禾苗挪动。"},
            {w:"吞噬", t:"噬", n:"誓", p:"tūn shì", d:"并吞、吃掉。", h:"吃东西用口。"},
            {w:"跌", t:"跌", n:"失", p:"diē", d:"摔倒，落下。", h:"跌倒用足。"}
        ]},
        { name: "第三关：沙漠寻宝", words: [
            {w:"屠", t:"屠", n:"署", p:"tú", d:"宰杀牲畜。", h:"尸字头。"},
            {w:"楞", t:"楞", n:"棱", p:"lèng", d:"失神、发呆的样子。", h:"木字旁的楞。"},
            {w:"不敢", t:"敢", n:"取", p:"bù gǎn", d:"没有胆量做某事。", h:"右边是反文。"},
            {w:"寡不敌众", t:"寡", n:"官", p:"guǎ bù dí zhòng", d:"人少抵挡不住人多。", h:"原意是少。"},
            {w:"散发", t:"散", n:"放", p:"sàn fā", d:"向四周发出、分发。", h:"左上是共。"},
            {w:"瞬间", t:"瞬", n:"顺", p:"shùn jiān", d:"极短的时间。", h:"眨眼用目。"},
            {w:"无计可施", t:"施", n:"方", p:"wú jì kě shī", d:"没法用了。", h:"方字旁。"},
            {w:"彻底", t:"彻", n:"设", p:"chè dǐ", d:"完全、透彻。", h:"双人旁。"}
        ]},
        { name: "第四关：天空之城", words: [
            {w:"偷袭", t:"袭", n:"衣", p:"tōu xí", d:"趁人不备进行攻击。", h:"下面是衣。"},
            {w:"压低", t:"压", n:"庄", p:"yā dī", d:"向下加力使其变小。", h:"下面有土。"},
            {w:"稳中求胜", t:"稳", n:"急", p:"wěn", d:"安定，不摇晃。", h:"禾字旁。"},
            {w:"往返", t:"返", n:"反", p:"wǎng fǎn", d:"去和回。", h:"走回来的路。"},
            {w:"原则", t:"则", n:"侧", p:"zé", d:"规矩、标准。", h:"立刀旁。"},
            {w:"倒", t:"倒", n:"到", p:"dǎo", d:"竖立的东西躺下。", h:"倒下的是人。"},
            {w:"乎", t:"乎", n:"呼", p:"hū", d:"文言语气词。", h:"乎字。"},
            {w:"漫", t:"漫", n:"慢", p:"màn", d:"水过满流出。", h:"水漫出用三点水。"},
            {w:"件", t:"件", n:"牛", p:"jiàn", d:"量词，如一……事。", h:"单人旁。"},
            {w:"有利", t:"利", n:"立", p:"yǒu lì", d:"有益处。", h:"立刀旁。"},
            {w:"引", t:"引", n:"弓", p:"yǐn", d:"拉开，引导。", h:"拉弓。"},
            {w:"懒", t:"懒", n:"赖", p:"lǎn", d:"不爱劳动或活动。", h:"心不想动。"},
            {w:"狡猾", t:"猾", n:"滑", p:"jiǎo huá", d:"诡诈不可信。", h:"反犬旁。"}
        ]},
        { name: "第五关：奇幻工厂", words: [
            {w:"绳", t:"绳", n:"神", p:"shéng", d:"条状的可捆绑物。", h:"丝做的。"},
            {w:"露", t:"露", n:"路", p:"lù", d:"靠近地面的水汽。", h:"雨字头。"},
            {w:"逗", t:"逗", n:"豆", p:"dòu", d:"停留，或者引人笑。", h:"走之底。"},
            {w:"举", t:"举", n:"句", p:"jǔ", d:"往上托，向上抬。", h:"举起。"},
            {w:"得意洋洋", t:"洋", n:"样", p:"yáng yáng", d:"形容非常满足。", h:"洋是水。"},
            {w:"退", t:"退", n:"腿", p:"tuì", d:"向后移动。", h:"向后走。"},
            {w:"剥", t:"剥", n:"博", p:"bāo", d:"去掉外皮。", h:"用刀剥。"},
            {w:"哼", t:"哼", n:"享", p:"hēng", d:"鼻子出气的声音。", h:"用口。"},
            {w:"迹", t:"迹", n:"记", p:"jì", d:"留下的印子。", h:"足迹要走。"},
            {w:"汹", t:"汹", n:"凶", p:"xiōng", d:"波浪翻腾的样子。", h:"三点水。"},
            {w:"逼", t:"逼", n:"副", p:"bī", d:"强迫，靠近。", h:"走之底。"},
            {w:"划", t:"划", n:"画", p:"huá", d:"弄出痕迹。", h:"用刀划。"},
            {w:"爬", t:"爬", n:"爪", p:"pá", d:"贴地挪动。", h:"用爪。"},
            {w:"成", t:"成", n:"城", p:"chéng", d:"完成，成功。", h:"成。"}
        ]},
        { name: "第六关：终极挑战", words: [
            {w:"盯着", t:"盯", n:"丁", p:"dīng", d:"注视，不放过。", h:"用眼。"},
            {w:"别在腰间", t:"别", n:"列", p:"bié", d:"插住，扣住。", h:"别。"},
            {w:"晚餐", t:"餐", n:"参", p:"wǎn cān", d:"傍晚吃的饭。", h:"食字底。"},
            {w:"疑惑", t:"惑", n:"或", p:"yí huò", d:"不明白，不确定。", h:"心不解。"},
            {w:"躲避", t:"避", n:"辟", p:"duǒ bì", d:"离开，不让碰上。", h:"避开。"},
            {w:"惹", t:"惹", n:"若", p:"rě", d:"招引，挑逗。", h:"惹事。"},
            {w:"警惕", t:"惕", n:"踢", p:"jǐng tì", d:"时刻防备。", h:"心。"},
            {w:"犹豫", t:"犹豫", n:"犹", p:"yóu yù", d:"拿不定主意。", h:"反犬旁。"},
            {w:"最终", t:"终", n:"中", p:"zuì zhōng", d:"最后。", h:"始终。"},
            {w:"已经", t:"已", n:"己", p:"yǐ jīng", d:"表示动作完成。", h:"已半开口。"},
            {w:"特殊", t:"殊", n:"珠", p:"tè shū", d:"不一般。", h:"殊。"},
            {w:"获", t:"获", n:"惑", p:"huò", d:"得到成果。", h:"草字头。"},
            {w:"图", t:"图", n:"突", p:"tú", d:"画，或者谋取。", h:"图。"}
        ]}
    ];

    let activePool = [], currentQ = null, totalInLevel = 0, wrongAttempts = 0;

    const levelList = document.getElementById('level-list');
    allLevels.forEach((lvl, idx) => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.innerText = lvl.name;
        btn.onclick = () => startLevel(idx);
        levelList.appendChild(btn);
    });

    function startLevel(idx) {
        activePool = JSON.parse(JSON.stringify(allLevels[idx].words));
        totalInLevel = activePool.length;
        wrongAttempts = 0;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        nextQuestion();
    }

    function nextQuestion() {
        if (activePool.length === 0) { showResult(); return; }
        document.getElementById('feedback').innerHTML = "";
        const randIdx = Math.floor(Math.random() * activePool.length);
        currentQ = activePool[randIdx];
        currentQ.poolIdx = randIdx;

        document.getElementById('pinyin').innerText = currentQ.p;
        document.getElementById('definition').innerHTML = `<b>意思：</b>${currentQ.d}`;

        const parts = currentQ.w.split(currentQ.t);
        document.getElementById('pre').innerText = parts[0] || "";
        document.getElementById('suf').innerText = parts[1] || "";

        const isFlip = Math.random() > 0.5;
        document.getElementById('opt0').innerText = isFlip ? currentQ.t : currentQ.n;
        document.getElementById('opt1').innerText = isFlip ? currentQ.n : currentQ.t;
        currentQ.correctBtn = isFlip ? 0 : 1;
        updateUI();
    }

    function handleChoice(idx) {
        const feedback = document.getElementById('feedback');
        if (idx === currentQ.correctBtn) {
            feedback.innerHTML = "<span style='color:var(--main);'>恭喜你，答对了！🌟</span>";
            activePool.splice(currentQ.poolIdx, 1);
            setTimeout(nextQuestion, 1000);
        } else {
            wrongAttempts++;
            feedback.innerHTML = `<span style='color:var(--wrong)'>❌ 记一记：${currentQ.h}</span><br>
            <small style='color:#0288D1; text-decoration:underline' onclick="window.open('https://dict.baidu.com/s?wd=${currentQ.t}')">点击查看笔画演示</small>`;
            setTimeout(nextQuestion, 3500);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('stat-text').innerText = `剩余: ${activePool.length}`;
        document.getElementById('progress-fill').style.width = ((totalInLevel - activePool.length) / totalInLevel) * 100 + "%";
    }

    function showResult() {
        const accuracy = Math.round((totalInLevel / (totalInLevel + wrongAttempts)) * 100);
        document.getElementById('game').innerHTML = `
            <div style="padding:20px;">
                <p style="font-size:60px;">🏆</p>
                <h3>挑战成功！</h3>
                <p>本关掌握率：<b style="font-size:24px; color:var(--main)">${accuracy}%</b></p>
                <button class="menu-btn" onclick="location.reload()">返回主菜单</button>
            </div>
        `;
    }
</script>
</body>
</html>
