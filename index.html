<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易错字全能挑战 - 笔顺强化版</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --main: #6BCB77; --wrong: #FF6B6B; --bg: #F0F9FF; --accent: #FFD93D; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #app { width: 92%; max-width: 600px; background: white; border-radius: 30px; padding: 15px; box-shadow: 0 10px 0 #B3E5FC; border: 4px solid #03A9F4; text-align: center; height: 94vh; display: flex; flex-direction: column; }
        .btn { background: var(--main); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-size: 17px; cursor: pointer; box-shadow: 0 5px 0 #4da658; font-weight: bold; margin: 5px; }
        .sentence { font-size: 22px; margin: 10px 0; font-weight: bold; min-height: 60px; display: flex; justify-content: center; align-items: center; line-height: 1.4; color: #2C3E50; }
        .blank { color: var(--wrong); border-bottom: 4px solid var(--wrong); padding: 0 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-card { background: #FFF; border: 3px solid #E1F5FE; border-radius: 15px; font-size: 24px; padding: 12px; cursor: pointer; box-shadow: 0 5px 0 #E1F5FE; touch-action: manipulation; display: flex; align-items: center; justify-content: center; min-height: 55px; }
        
        /* 手写板区域 - 强化笔顺提示 */
        #writer-container { display: none; flex-direction: column; align-items: center; justify-content: center; background: #FFF; border-radius: 20px; padding: 10px; border: 3px solid #FF9800; margin: 5px 0; }
        #grid { width: 180px; height: 180px; background: url('https://hanziwriter.org/images/grid.png'); background-size: contain; border: 2px solid #333; margin-bottom: 10px; }
        .stroke-warn { color: #E91E63; font-weight: bold; font-size: 16px; margin: 5px 0; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .hidden { display: none; }
        .phase-tag { font-size: 13px; color: white; font-weight: bold; margin-bottom: 5px; background: #03A9F4; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .progress-container { width: 100%; height: 8px; background: #EEE; border-radius: 10px; margin: 5px 0; }
        #progress-fill { height: 100%; background: var(--main); width: 0%; border-radius: 10px; transition: 0.3s; }
        #level-buttons { overflow-y: auto; flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-login">

        <br><br><button class="btn" onclick="goToMenu()">开启冒险</button>
    </div>

    <div id="screen-menu" class="hidden">
        <h2 id="welcome-text"></h2>
        <div id="level-buttons"></div>
    </div>

    <div id="screen-game" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="location.reload()" style="background:none; border:none; color:#03A9F4; font-size:14px;">🏠 首页</button>
            <span id="level-title" style="font-weight:bold; font-size:14px;"></span>
            <span id="stat-count" style="font-size:12px;"></span>
        </div>
        <div class="progress-container"><div id="progress-fill"></div></div>
        
        <div id="game-content">
            <div id="phase-tag" class="phase-tag">阶段一：字形辨析</div>
            
            <!-- 手写区域：强化笔顺提示 -->
            <div id="writer-container">

                <p style="font-size:14px; margin:0 0 5px 0;">请书写：<b id="write-target" style="color:var(--main); font-size:24px;"></b></p>
                <div id="grid"></div>
                <div>
                    <button class="btn" style="padding:5px 12px; font-size:13px; background:#95A5A6; box-shadow:0 4px 0 #7F8C8D;" onclick="writer.animateCharacter()">先看演示</button>
                    <button class="btn" style="padding:5px 12px; font-size:13px; background:#FF9800; box-shadow:0 4px 0 #F57C00;" onclick="writer.quiz()">重写</button>
                </div>
            </div>

            <div id="display-area">

                <div class="sentence" id="s-text"></div>
            </div>
            <div class="options" id="opt-area"></div>
        </div>
        <div id="feedback" style="margin-top:10px; min-height:40px; font-weight:bold; font-size:18px;"></div>
    </div>

    <div id="screen-result" class="hidden">
        <div style="background:#E8F5E9; padding:25px; border-radius:25px; border:2px dashed var(--main);">

            <p id="res-level"></p>

            <button class="btn" onclick="location.reload()">继续挑战</button>
        </div>
    </div>
</div>

    function goToMenu() {
        userName = document.getElementById('user-name').value;
        if(!userName) return alert("请输入姓名");
        document.getElementById('screen-login').className = "hidden";
        document.getElementById('screen-menu').className = "";
        document.getElementById('welcome-text').innerText = `你好，${userName}！`;
        const container = document.getElementById('level-buttons');
        container.innerHTML = "";
        database.forEach((lvl, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = lvl.name;
            b.onclick = () => startLevel(i);
            container.appendChild(b);
        });
    }

    function startLevel(idx) {
        currentLevelData = JSON.parse(JSON.stringify(database[idx].data));
        activePool = [...currentLevelData];
        currentPhase = 1; totalTried = 0; score = 0;
        document.getElementById('screen-menu').className = "hidden";
        document.getElementById('screen-game').className = "";
        document.getElementById('level-title').innerText = database[idx].name;
        nextQuestion();
    }

    function nextQuestion() {
        if(activePool.length === 0) {
            if(currentPhase === 1) {
                alert("🎉 字形辨析过关！进入语境挑战！");

                nextQuestion(); return;
            } else { return finishGame(); }
        }
        document.getElementById('feedback').innerText = "";
        document.getElementById('writer-container').style.display = "none";
        document.getElementById('display-area').style.display = "block";
        document.getElementById('opt-area').style.display = "grid";
        const r = Math.floor(Math.random() * activePool.length);
        currentQ = activePool[r]; currentQ.tIdx = r;
        renderUI();
    }

    function renderUI() {
        const optArea = document.getElementById('opt-area');
        const sText = document.getElementById('s-text');
        const dText = document.getElementById('d-text');
        const tag = document.getElementById('phase-tag');
        optArea.innerHTML = "";
        if(currentPhase === 1) {
            tag.innerText = "阶段一：字形辨析"; tag.style.background = "#03A9F4";
            dText.innerHTML = `<b>提示：</b>${currentQ.d}`;
            const parts = currentQ.w.split(currentQ.t);
            sText.innerHTML = `${parts[0]}<span class="blank">?</span>${parts[1]}`;
            const isF = Math.random() > 0.5;
            renderOpt(isF ? currentQ.t : currentQ.n, isF);
            renderOpt(isF ? currentQ.n : currentQ.t, !isF);
        } else {
            tag.innerText = "阶段二：语境辨析"; tag.style.background = "#E91E63";
            dText.innerHTML = `<b>任务：</b>选出最恰当的词。`;
            sText.innerHTML = currentQ.q2.replace("( )", "<span class='blank'>？</span>");
            const isF = Math.random() > 0.5;
            renderOpt(isF ? currentQ.o2[0] : currentQ.o2[1], isF);
            renderOpt(isF ? currentQ.o2[1] : currentQ.o2[0], !isF);
        }
        updateStat();
    }

    function renderOpt(txt, isCorrect) {
        const b = document.createElement('div');
        b.className = "opt-card"; b.innerText = txt;
        b.onclick = () => handleResult(isCorrect);
        document.getElementById('opt-area').appendChild(b);
    }

    function handleResult(isCorrect) {
        totalTried++;
        const fb = document.getElementById('feedback');
        if(isCorrect) {
            if(currentPhase === 1) initWriter(currentQ.t);
            else {
                fb.innerHTML = "<span style='color:var(--main)'>✔ 答对了！</span>";
                activePool.splice(currentQ.tIdx, 1);
                score++; setTimeout(nextQuestion, 800);
            }
        } else {
            fb.innerHTML = `<span style='color:var(--wrong)'>❌ 记一记：${currentQ.h}</span>`;
            setTimeout(nextQuestion, 2500);
        }
    }

    function initWriter(char) {
        document.getElementById('display-area').style.display = "none";
        document.getElementById('opt-area').style.display = "none";
        document.getElementById('writer-container').style.display = "flex";
        document.getElementById('write-target').innerText = char;
        document.getElementById('feedback').innerText = "选对了！请按笔顺书写该字：";
        document.getElementById('grid').innerHTML = "";
        writer = HanziWriter.create('grid', char, {
            width: 180, height: 180, showCharacter: false, padding: 5,
            onComplete: function() {
                document.getElementById('feedback').innerHTML = "<span style='color:var(--main)'>书写正确！🌟</span>";
                activePool.splice(currentQ.tIdx, 1);
                score++; setTimeout(nextQuestion, 1000);
            }
        });
        writer.quiz(); // 自动进入 Quiz 模式
    }

    function updateStat() {
        const total = 13, rem = activePool.length;
        document.getElementById('stat-count').innerText = `剩余: ${rem}`;
        let base = currentPhase === 1 ? 0 : 50;
        document.getElementById('progress-fill').style.width = (base + ((total - rem) / total * 50)) + "%";
    }

    function finishGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('res-name').innerText = userName;
        document.getElementById('res-level').innerText = document.getElementById('level-title').innerText;
        document.getElementById('res-acc').innerText = Math.round((13 / (totalTried/2)) * 100) + "%";
    }
</script>
</body>
</html>
